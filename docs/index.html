<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>THE PL BRIEF — Archive</title>
<style>
body { margin: 0; padding: 40px 20px; background: #FAF9FA; font-family: 'Segoe UI', Arial, sans-serif; color: #37003C; }
.container { max-width: 620px; margin: 0 auto; }
h1 { font-size: 28px; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 32px; }
.briefing-list { list-style: none; padding: 0; }
.briefing-list li { margin-bottom: 12px; }
.briefing-list a { display: block; padding: 16px 20px; background: #fff; border-radius: 16px; text-decoration: none; color: #37003C; font-size: 16px; font-weight: 600; border-left: 4px solid #37003C; }
.briefing-list a:hover { background: #EBE5EB; }
.briefing-list .date { font-weight: 400; font-size: 13px; color: #666; margin-left: 8px; }
</style>
</head>
<body>
<div class="container">
<h1>THE PL BRIEF</h1>
<p class="subtitle">Weekly Premier League briefing archive</p>
<ul class="briefing-list" id="list"></ul>
</div>
<script>
// Auto-populate from known briefings — add new entries at the top
const briefings = [
  { file: 'PL-Brief-MW32-2026-04-16.html', label: 'Matchweek 32', date: 'April 16, 2026' },
  { file: 'PL-Brief-MW31-2026-04-09.html', label: 'Matchweek 31', date: 'April 9, 2026' },
  { file: 'PL-Brief-MW31-2026-04-07.html', label: 'Matchweek 31', date: 'April 7, 2026' }
];
const list = document.getElementById('list');
briefings.forEach(b => {
  const li = document.createElement('li');
  li.innerHTML = `<a href="${b.file}">${b.label}<span class="date">${b.date}</span></a>`;
  list.appendChild(li);
});
</script>
</body>
</html>
